<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<title>Full Screen Image</title>
<style>
    html, body {
        margin: 0;
        padding: 0;
        height: 100%;
    }

    img {
        width: 100vw;      /* 화면 가로 100% */
        height: 100vh;     /* 화면 세로 100% */
        object-fit: cover; /* 비율 유지 + 꽉 채움 */
        display: block;
    }
</style>
</head>
<body>
<img src="https://github.com/eteverseepauc-sh/demo/issues/1#issue-3994230362"
</body>
</html>
